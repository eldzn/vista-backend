services:
  postgres:
    image: postgres:15-alpine
    container_name: vista-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: vista_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vista-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vista-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - vista-network

volumes:
  postgres_data:

networks:
  vista-network:
    driver: bridge